services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: support-ai-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_API_URL: http://api:8000
    container_name: support-ai-frontend
    restart: unless-stopped
    environment:
      BACKEND_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
